[pytest]
addopts = -v --tb=short --strict-markers
markers =
    functional: Test fungsional UI (Selenium)
    performance: Test performa (FCP, respons filter)
    security: Test keamanan (RBAC, rate-limit, proteksi route)
    localization: Test lokalisasi & brand (Bahasa Indonesia, warna, logo)
    smoke: Subset cepat untuk verifikasi dasar
